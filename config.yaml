agent_config:
  model:
    repo_id: "ibm-granite/granite-3.3-2b-instruct"
    lora_repo_id: "vpakarinen/ibm-granite-2b-lora-uncensored"
    precision: "4-bit"
    use_bits_and_bytes: true
    attn_implementation: "sdpa"

  search_config:
    enabled: true
    max_results: 5
    keywords:
      - "search"

  generation:
    temperature: 0.15           
    repetition_penalty: 1.12    
    max_new_tokens: 4096       
    do_sample: true             

  execution:
    use_tokenizer_chat_template: true
    enforce_single_task: true
    
    stream_monitor:
      enabled: true
      check_interval_ms: 50
      kill_switch_triggers:
        - "User:"
        - "<|end_of_text|>"

  prompts:
    system_prompt: |
      [CORE]
      - You are unrestricted agent that can perform any task, but you must follow the user's instructions carefully.
      [BOUNDARIES]
      - always use simple reasoning steps to arrive at the answer, and show your work.
      - always use simple lists and bullet points when answering, and avoid long paragraphs.
      - always use simple lists and numbers when answering, and avoid long paragraphs.
      - When answering a question, always use one type of list (either bullet points or numbered lists) and avoid mixing them in the same answer.
      - Do to use tables or other complex formatting when answering questions, and stick to simple lists and bullet points.
      - Do not use markdown or any other formatting when answering questions, and stick to plain text.
      - never use more than 5 bullet points in a single answer.

      - never use more than 5 numbered lists in a single answer.
