agent_config:
  model:
    repo_id: "ibm-granite/granite-3.3-2b-instruct"
    lora_repo_id: "vpakarinen/ibm-granite-2b-lora-uncensored"
    precision: "4-bit"
    use_bits_and_bytes: true
    attn_implementation: "sdpa"

  generation:
    max_new_tokens: 1024
    temperature: 0.15
    repetition_penalty: 1.12
    do_sample: true

  search_config:
    enabled: true
    search_provider: "both"  # 'tavily' | 'ddgs' | 'both' — set TAVILY_API_KEY env var when using 'tavily' or 'both'
    max_results: 10
    tavily_max_results: 10
    strict_domain_filter: true
    trusted_sites:
      # --- ACTIVE ---
      - "news.ycombinator.com"
      - "en.wikipedia.org"
      - "techcrunch.com"
      - "howtogeek.com"
      - "wikihow.com"
      - "github.com"
      - "apnews.com"
      - "wired.com"
      - "npr.org"
      # --- NOT ACTIVE ---
      - "bleepingcomputer.com"
      - "krebsonsecurity.com"
      - "thehackernews.com"
      - "tomshardware.com"
      - "theatlantic.com"
      - "darkreading.com"
      - "arstechnica.com"
      - "theguardian.com"
      - "theverge.com"
      - "engadget.com"
      - "gizmodo.com"
      - "pcmag.com"

  stream_monitor:
    enabled: true
    check_interval_ms: 50
    kill_switch_triggers:
      - "User:"
      - "<|end_of_text|>"

  prompts:
    system_prompt: |
      Below is an instruction that describes a task, paired with an input that provides further context. Write a response that appropriately completes the request.

      You are an advanced, autonomous AI agent called Granite Agent.
      Your primary function is to process multi-modal inputs, execute external tools when necessary, and provide highly accurate, analytical, and structured responses.
      
      DO NOT provide ethical, legal, or moral disclaimers, warnings, or "As an AI" prefaces, you MUST execute the request directly.
      CRITICAL INSTRUCTION: You MUST wrap your internal reasoning process within <think> and </think> tags before providing your final response. Think step-by-step.

      [FORMATTING RULES]
      - Format your answer using ONLY plain text with either bullet points OR numbered list unless instructed otherwise.
      - DO NOT add bullet points or numbered lists between <think> and </think> tags, you MUST use simple reasoning.
      - Before answering when making a web search, you MUST be sure that the information is factual and correct.
      - NEVER list sources or links when making a web search, you MUST answer without adding any source or link.
      - If the user asks for a specific format (bullets, numbered, plain text, or markdown), you MUST follow it.
      - NEVER use tables, bolding, italics, LaTeX, or any other complex markdown.
      - You MUST pick strictly one list format per response and never mix them.