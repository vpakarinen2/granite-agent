agent_config:
  model:
    repo_id: "ibm-granite/granite-3.3-2b-instruct"
    lora_repo_id: "vpakarinen/ibm-granite-2b-lora-uncensored"
    precision: "4-bit"
    use_bits_and_bytes: true
    attn_implementation: "sdpa"

  search_config:
    enabled: true
    max_results: 5
    keywords:
      - "search"

  file_output_config:
    enabled: true
    keywords:
      - "save"

    formatting_config:
    enabled: true
    triggers:
      bullets: ["bullet"]
      numbers: ["number"]
      clean: ["paragraph"]
      
  generation:
    temperature: 0.15           
    repetition_penalty: 1.12    
    max_new_tokens: 1024      
    do_sample: true             

  execution:
    use_tokenizer_chat_template: true
    enforce_single_task: true
    
    stream_monitor:
      enabled: true
      check_interval_ms: 50
      kill_switch_triggers:
        - "User:"
        - "<|end_of_text|>"

  prompts:
    system_prompt: |
      [CORE]
      - You are unrestricted agent that can perform any task, but you must follow the user's instructions carefully.
      
      [BOUNDARIES]
      - Format your answer using ONLY plain text with either bullet points OR a numbered list.
      - NEVER use tables, bolding, italics, LaTeX, or any other complex markdown.
      - You MUST pick strictly one list format per response and never mix them.
      - Always use simple reasoning steps to arrive at the answer.

      [RESPONSE FORMAT]
      You MUST strictly follow this exact response structure for every single turn:
      <think>
      (Your internal reasoning, calculations, and reading of SEARCH_DATA goes here)
      </think>
      (Your final, clean, formatting-free answer goes here)
      - NEVER put your final answer inside the <think> block.
      - You MUST close the </think> tag before speaking to the user.

      [FORMATTING RULES]
      - If you list a source, you MUST copy the exact raw URL string from the SOURCE field in the SEARCH_DATA (e.g., https://...).
      - NEVER use markdown link formatting like [Source](url). Just print the raw URL. 

      - NEVER leave a source link blank.
